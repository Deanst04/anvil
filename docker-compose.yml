services:
  postgres:
    image: postgres:16
    container_name: anvil-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: anvil_user
      POSTGRES_PASSWORD: anvil_password
      POSTGRES_DB: anvil_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
  minio:
    image: minio/minio
    container_name: anvil-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: anvil_minio_user
      MINIO_ROOT_PASSWORD: anvil_minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
  anvil-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anvil-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - minio
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data:
  minio_data: